<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Blog Banner</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 1100px;
    background: #d9d4cc;
    border-radius: 25px;
    padding: 30px;
    display: flex;
    gap: 30px;
    align-items: center;
}

/* Image slider */
.image-box {
    flex: 1;
    height: 350px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    opacity: 0;
    transition: opacity 1s ease, transform 0.5s ease;
}

.image-box img.active {
    opacity: 1;
}

.image-box:hover img.active {
    transform: scale(1.05);
}

/* Content */
.content {
    flex: 1;
}

.content h1 {
    font-size: 48px;
    color: #333;
    margin-bottom: 15px;
}

.content p {
    color: #555;
    line-height: 1.6;
    margin-bottom: 25px;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #222;
    color: #fff;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #444;
    transform: translateY(-3px);
}

.icons {
    margin-top: 20px;
}

.icons span {
    display: inline-block;
    width: 35px;
    height: 35px;
    line-height: 35px;
    text-align: center;
    border: 1px solid #aaa;
    border-radius: 50%;
    margin-right: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.icons span:hover {
    background: #222;
    color: #fff;
}
</style>

</head>
<body>

<div class="container">

    <!-- Image slider -->
    <div class="image-box">
        <img src="https://picsum.photos/600/400?random=1" class="active">
        <img src="https://picsum.photos/600/400?random=2">
        <img src="https://picsum.photos/600/400?random=3">
    </div>

    <!-- Content -->
    <div class="content">
        <h1>Journey Through Life’s Spectrum</h1>
        <p>
            Welcome to Perspective's Blog: A Realm of Reflection, Inspiration, 
            and Discovery. Where Words Illuminate Paths of Meaning and Thoughts 
            Unravel the Mysteries of Life's Spectrum.
        </p>

        <a href="#" class="btn">Join Now</a>

        <div class="icons">
            <span>📷</span>
            <span>f</span>
            <span>in</span>
        </div>
    </div>

</div>

<script>
let images = document.querySelectorAll(".image-box img");
let index = 0;

setInterval(() => {
    images[index].classList.remove("active");
    index = (index + 1) % images.length;
    images[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
